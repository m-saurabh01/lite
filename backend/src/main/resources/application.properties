# ============================================================
# EMMS Lite Backend Configuration
# ============================================================

server.port=8095
server.address=127.0.0.1

# ---- Application Info ----
app.name=EMMS Lite
app.version=1.0.0

# ---- Data Directory (resolved at runtime) ----
# Default: ./data relative to installation dir. Override via env var EMMS_DATA_DIR.
app.data-dir=${EMMS_DATA_DIR:./data}

# ---- SQLite Datasource ----
spring.datasource.url=jdbc:sqlite:${app.data-dir}/app.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- Flyway ----
flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- File Storage ----
app.uploads-dir=${app.data-dir}/uploads
app.xml-import-dir=${app.data-dir}/uploads/xml

# ---- Logging ----
logging.file.name=${app.data-dir}/../logs/emms-backend.log
logging.level.root=INFO
logging.level.com.aircraft.emms=DEBUG
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ---- Security ----
app.security.token-validity-hours=24
app.security.default-admin-service-id=ADMIN001
